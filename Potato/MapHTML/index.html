```html
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potatoverse - Dynamic Map Engine</title>
    <style>
        :root {
            --bg-deep: #05040a;
            --accent-primary: #a855f7;
            --text-main: #f8f9fa;
            --panel-bg: rgba(6, 4, 12, 0.98);
            --panel-border: rgba(168, 85, 247, 0.3);
            --slide-speed: 1s;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        body { 
            background-color: var(--bg-deep); 
            color: var(--text-main); 
            overflow: hidden; 
            height: 100vh;
            display: flex;
        }

        /* --- NAVIGATION DYNAMIQUE --- */
        .region-nav {
            position: fixed;
            top: 25px;
            left: calc(50% - 240px); /* Centré sur la partie carte */
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            background: rgba(0,0,0,0.85);
            padding: 5px;
            border-radius: 50px;
            border: 1px solid var(--panel-border);
            backdrop-filter: blur(15px);
        }
        .nav-btn {
            padding: 10px 22px;
            border-radius: 25px;
            border: none;
            background: transparent;
            color: #666;
            cursor: pointer;
            font-weight: bold;
            transition: 0.4s;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 2px;
        }
        .nav-btn.active { 
            background: var(--accent-primary); 
            color: white;
            box-shadow: 0 0 20px var(--accent-primary); 
        }

        /* --- STRUCTURE --- */
        .app-shell { display: flex; width: 100%; height: 100%; }

        /* ZONE CARTE (GÉRÉE PAR JS) */
        .map-viewport {
            flex-grow: 1;
            height: 100%;
            overflow: hidden;
            position: relative;
        }
        .map-slider {
            display: flex;
            height: 100%;
            transition: transform var(--slide-speed) cubic-bezier(0.65, 0, 0.35, 1);
        }

        .map-canvas {
            width: 100%; /* Défini dynamiquement en JS selon le nombre de régions */
            height: 100%;
            flex-shrink: 0;
            position: relative;
            background-size: cover;
            background-position: center;
        }

        .region-overlay {
            position: absolute;
            top: 70px;
            left: 50px;
            z-index: 5;
            pointer-events: none;
        }
        .region-overlay h2 { font-size: 0.9rem; letter-spacing: 5px; color: var(--accent-primary); text-transform: uppercase; }
        .region-overlay h1 { font-size: 4.5rem; font-weight: 900; font-style: italic; text-transform: uppercase; line-height: 1; }

        /* --- POINTS D'INTÉRÊT --- */
        .poi {
            position: absolute;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            z-index: 10;
            transition: 0.3s;
        }
        .poi img {
            width: 200px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 0 15px rgba(0,0,0,0.8));
        }
        .poi:hover img { transform: scale(1.15) translateY(-10px); }
        .poi-tag {
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid var(--accent-primary);
            padding: 5px 12px;
            border-radius: 3px;
            margin-top: 10px;
            font-size: 0.8rem;
            font-weight: bold;
            white-space: nowrap;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 480px;
            height: 100%;
            background: var(--panel-bg);
            border-left: 2px solid var(--panel-border);
            z-index: 100;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            padding: 100px 30px 40px;
        }
        .sidebar-title { margin-bottom: 30px; }
        .sidebar-title h3 { font-size: 1.8rem; letter-spacing: 2px; }
        .sidebar-title .divider { height: 4px; width: 50px; background: var(--accent-primary); margin-top: 10px; }

        .card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            margin-bottom: 20px;
            cursor: pointer;
            overflow: hidden;
            transition: 0.3s;
        }
        .card:hover { border-color: var(--accent-primary); background: rgba(255,255,255,0.06); }
        .card-img { width: 100%; height: 160px; object-fit: cover; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .card-body { padding: 20px; }
        .card-body h4 { font-size: 1.2rem; margin-bottom: 5px; color: white; }
        .card-body p { color: #888; font-size: 0.85rem; line-height: 1.5; }

        /* Animations */
        @keyframes floating { 0%, 100% { transform: translate(-50%, -50%) translateY(0); } 50% { transform: translate(-50%, -50%) translateY(-15px); } }
        .float { animation: floating 6s ease-in-out infinite; }

        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%);
            background-size: 100% 4px; pointer-events: none; z-index: 2000;
        }
    </style>
</head>
<body>

    <div class="scanlines"></div>

    <nav class="region-nav" id="mainNav"></nav>

    <div class="app-shell">
        <div class="map-viewport">
            <div class="map-slider" id="mapSlider"></div>
        </div>

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-title" id="sidebarHeader"></div>
            <div id="sidebarContent"></div>
        </aside>
    </div>

    <script>
        // CONFIGURATION JSON : LE CŒUR DE TA CARTE
        const potatoverseData = {
            regions: [
                {
                    id: "grand-vide",
                    name: "Grand Vide",
                    subtitle: "Secteur Omega",
                    background: "Fond1.png",
                    accentColor: "#a855f7",
                    zones: [
                        { name: "ÉRATHIEL", img: "Erathiel.png", top: "35%", left: "30%", desc: "Capitale technologique du Grand Vide.", type: "Capitale" },
                        { name: "MAÇON'ÎLE", img: "Maconile.png", top: "45%", left: "65%", desc: "Site d'extraction massif de ressources.", type: "Industrie" },
                        { name: "ÎLE ALPHA", img: "Inconnue1.png", top: "75%", left: "20%", desc: "Secteur inexploré.", type: "Inconnu" },
                        { name: "ÎLE BETA", img: "Inconnue2.png", top: "82%", left: "45%", desc: "Secteur inexploré.", type: "Inconnu" },
                        { name: "ÎLE GAMMA", img: "Inconnue3.png", top: "78%", left: "80%", desc: "Secteur inexploré.", type: "Inconnu" }
                    ]
                },
                {
                    id: "region-sacree",
                    name: "Région Sacrée",
                    subtitle: "Sanctuaire Tropical",
                    background: "1000077124.png",
                    accentColor: "#eab308",
                    zones: [
                        { name: "BASE VERSE", img: "BaseVerse.png", top: "35%", left: "32%", desc: "Le QG opérationnel de la Team Verse.", type: "Base" },
                        { name: "TEMPLE PATATE", img: "TempleSacre.png", top: "42%", left: "70%", desc: "Lieu mystique protégeant la Graine.", type: "Relique", filter: "hue-rotate(45deg)" },
                        { name: "POSTE OMEGA", img: "Inconnue4.png", top: "75%", left: "25%", desc: "Observation des flux Daïmon.", type: "Poste" },
                        { name: "GROTTE ÉCHOS", img: "Inconnue4.png", top: "80%", left: "75%", desc: "Résonance énergétique détectée.", type: "Anomalie" }
                    ]
                },
                {
                    id: "region-3",
                    name: "Monde dechu",
                    subtitle: "Hmm...il semble que la pollution a pris le dessu",
                    background: "1000077124.png",
                    accentColor: "#ea0008",
                    zones: [
                        { name: "GROTTE ÉCHOS", img: "Inconnue4.png", top: "80%", left: "75%", desc: "Résonance énergétique détectée.", type: "Anomalie" }
                    ]
                }
                // Tu peux ajouter une 4ème région ici très facilement !
            ]
        };

        const mapSlider = document.getElementById('mapSlider');
        const mainNav = document.getElementById('mainNav');
        const sidebarHeader = document.getElementById('sidebarHeader');
        const sidebarContent = document.getElementById('sidebarContent');

        let currentRegionIndex = 0;

        // INITIALISATION DYNAMIQUE
        function initApp() {
            const regionCount = potatoverseData.regions.length;
            mapSlider.style.width = `${regionCount * 100}%`;

            potatoverseData.regions.forEach((region, index) => {
                // 1. Créer le bouton de nav
                const btn = document.createElement('button');
                btn.className = `nav-btn ${index === 0 ? 'active' : ''}`;
                btn.id = `nav-${index}`;
                btn.innerText = region.name;
                btn.onclick = () => switchRegion(index);
                mainNav.appendChild(btn);

                // 2. Créer le canvas de la carte
                const canvas = document.createElement('div');
                canvas.className = 'map-canvas';
                canvas.style.backgroundImage = `url(${region.background})`;
                canvas.style.width = `${100 / regionCount}%`;

                // Header de région
                canvas.innerHTML = `
                    <div class="region-overlay">
                        <h2 style="color:${region.accentColor}">${region.subtitle}</h2>
                        <h1>${region.name}</h1>
                    </div>
                `;

                // Ajouter les POI
                region.zones.forEach((zone) => {
                    const poi = document.createElement('div');
                    poi.className = 'poi float';
                    poi.style.top = zone.top;
                    poi.style.left = zone.left;
                    poi.innerHTML = `
                        <img src="${zone.img}" style="${zone.filter || ''}">
                        <div class="poi-tag" style="border-color:${region.accentColor}">${zone.name}</div>
                    `;
                    canvas.appendChild(poi);
                });

                mapSlider.appendChild(canvas);
            });

            updateSidebar(0);
        }

        function switchRegion(index) {
            currentRegionIndex = index;
            const region = potatoverseData.regions[index];
            const regionCount = potatoverseData.regions.length;

            // Slide
            mapSlider.style.transform = `translateX(-${(index * 100) / regionCount}%)`;

            // Nav active
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`nav-${index}`).classList.add('active');

            // Couleurs d'accentuation
            document.documentElement.style.setProperty('--accent-primary', region.accentColor);
            document.documentElement.style.setProperty('--panel-border', hexToRgba(region.accentColor, 0.3));

            updateSidebar(index);
        }

        function updateSidebar(index) {
            const region = potatoverseData.regions[index];
            
            // Header
            sidebarHeader.innerHTML = `
                <h3 style="color:${region.accentColor}">${region.name}</h3>
                <div class="divider" style="background:${region.accentColor}"></div>
            `;

            // Liste des cartes
            sidebarContent.innerHTML = '';
            region.zones.forEach(zone => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${zone.img}" class="card-img" style="${zone.filter || ''}">
                    <div class="card-body">
                        <span style="color:${region.accentColor}; font-size:0.7rem; font-weight:800;">${zone.type.toUpperCase()}</span>
                        <h4>${zone.name}</h4>
                        <p>${zone.desc}</p>
                    </div>
                `;
                sidebarContent.appendChild(card);
            });
        }

        // Utilitaire pour gérer les couleurs
        function hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        initApp();
    </script>
</body>
</html>
